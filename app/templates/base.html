{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gerenciamento{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'base.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/system-table-theme.css' %}">
    {% block extra_css %}{% endblock %}
    <link rel="stylesheet" href="{% static 'css/shared/filter-ux.css' %}">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para conteudo</a>
    <header class="site-header">
        <div class="container">
            {% include "blocks/nav.html" %}
        </div>
    </header>

    <main id="main-content" class="site-main">
        <div class="container">
            {% include "blocks/messages.html" %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            {% include "blocks/footer.html" %}
        </div>
    </footer>

    <script src="{% static 'js/shared/frontend-texts.js' %}"></script>
    <script src="{% static 'js/shared/tabulator-defaults.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
